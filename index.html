<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeachMate Headteacher Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --gradient: linear-gradient(135deg, #2e8b57 0%, #228b22 100%); /* Enhanced to Zambian green tones */
      --glass: rgba(255, 255, 255, 0.25);
      --light: #f8f9fa;
      --dark: #212529;
      --text-light: #343a40;
      --accent: #28a745; /* Greener accent */
      --secondary: #fd7e14; /* Orange for contrast */
      --radius: 12px; /* Slightly smaller radius for modern look */
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
      --alert-red: #dc3545;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--light);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--gradient);
      padding: 1rem 2rem;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--light);
    }

    #school-name-display {
      font-size: 1.2rem;
      color: var(--light);
    }

    .app-container {
      display: flex;
      flex: 1;
      max-width: 1200px;
      margin: auto;
    }

    /* Sidebar Navigation */
    .sidebar {
      display: none; /* Hidden initially until login */
      width: 250px;
      background: var(--light);
      padding: 1rem;
      box-shadow: var(--shadow);
      height: calc(100vh - 60px); /* Adjust for header */
      position: sticky;
      top: 60px; /* Header height */
      overflow-y: auto;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar li {
      margin-bottom: 1rem;
    }

    .sidebar a {
      display: block;
      padding: 0.8rem;
      background: var(--glass);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-light);
      font-weight: 500;
    }

    .sidebar a:hover, .sidebar a.active {
      background: var(--accent);
      color: var(--light);
    }

    .content-container {
      flex: 1;
      padding: 2rem 1rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-radius: var(--radius);
      padding: 1.8rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--accent);
      margin-bottom: 2rem;
    }

    .card h2 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    input, select, button {
      width: 100%;
      padding: 0.8rem;
      margin: 0.5rem 0;
      border-radius: 8px;
      border: 1px solid var(--accent);
    }

    button {
      background: var(--accent);
      color: var(--light);
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: var(--secondary);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    th, td {
      padding: 0.8rem;
      border: 1px solid var(--accent);
      text-align: left;
    }

    th {
      background: var(--gradient);
      color: var(--light);
    }

    .teacher-item, .student-item {
      display: flex;
      align-items: center;
      margin-bottom: 1rem;
    }

    .teacher-item span, .student-item span {
      font-size: 1.5rem;
      margin-right: 1rem;
    }

    .empty-state {
      text-align: center;
      color: #6c757d;
      margin: 1rem 0;
    }

    #auth-section, #dashboard, #teacher-selection, #class-selection, #data-view, #settings-section { display: none; }

    #loading-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }

    #loading-modal .modal-content {
      background: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    
    .student-details-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background-color: #f9f9f9;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .student-details-table th, .student-details-table td {
      padding: 12px 20px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    .student-details-table th {
      background-color: var(--accent);
      color: #ffffff;
      font-weight: 600;
    }

    .student-details-table tr:hover {
      background-color: #f1f1f1;
    }

    .student-details-table td {
      font-size: 14px;
      color: #333;
    }

    /* Exit Button Styling */
    .exit-btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: var(--alert-red);
      color: white;
      border: none;
      border-radius: 5px;
      margin-top: 20px;
      cursor: pointer;
      font-weight: 600;
      text-align: center;
    }

    .exit-btn:hover {
      background-color: #c82333;
    }

    /* Summary Cards */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .summary-card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
      box-shadow: var(--shadow);
      border: 1px solid var(--accent);
    }

    .summary-card h3 {
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }

    .summary-card p {
      font-size: 1.5rem;
      font-weight: bold;
    }

    /* Alerts */
    .alerts-section {
      margin-bottom: 1rem;
    }

    .alert {
      background: var(--alert-red);
      color: var(--light);
      padding: 0.8rem;
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }

    /* Charts */
    .chart-container {
      margin-top: 1rem;
      max-width: 100%;
    }

    /* Search Input */
    .search-input {
      margin-bottom: 1rem;
    }

    /* Clickable Name */
    .student-name {
      cursor: pointer;
      color: var(--accent);
      text-decoration: underline;
    }

    .student-name:hover {
      color: var(--secondary);
    }

    /* Tabs for Sections */
    .section-tabs {
      display: flex;
      justify-content: space-around;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .section-tab {
      flex: 1 1 auto;
      padding: 0.8rem;
      text-align: center;
      background: var(--light);
      border: 1px solid var(--accent);
      cursor: pointer;
      margin: 0.2rem;
    }

    .section-tab.active {
      background: var(--accent);
      color: var(--light);
    }

    .section-tab:hover {
      background: var(--secondary);
      color: var(--light);
    }

    /* Export Button */
    .export-btn {
      background: var(--secondary);
      margin-top: 1rem;
    }

    .export-btn:hover {
      background: var(--accent);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        top: auto;
      }

      .sidebar ul {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }

      .sidebar li {
        margin: 0.5rem;
      }

      .content-container {
        padding: 1rem;
      }

      header h1 {
        font-size: 1.4rem;
      }

      .summary-cards {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      }

      table th, table td {
        padding: 0.5rem;
        font-size: 0.9rem;
      }
    }

    @media (max-width: 480px) {
      input, select, button {
        padding: 0.6rem;
      }

      .card {
        padding: 1.2rem;
      }

      .summary-card p {
        font-size: 1.2rem;
      }
    }
    
    
    /* Section tabs container */
.section-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

/* All buttons */
.section-tab {
  padding: 10px 20px;
  border: 1px solid var(--accent);
  background: var(--light);      /* white background */
  color: #333333;                /* dark text */
  font-weight: 600;
  font-size: 14px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.2s ease;
}

/* Hover effect for unselected buttons */
.section-tab:hover {
  background: var(--accent);
  color: var(--light);
}

/* Selected/active tab */
.section-tab.active {
  background: var(--accent);    /* keeps your existing highlight */
  color: var(--light);           /* white text */
}
    
    
    
  </style>
</head>
<body>
  <header>
    <h1>TeachMate Headteacher Dashboard</h1>
    <span id="school-name-display"></span>
    <button id="logout-btn" style="display: none; padding: 0.5rem 1rem; background: var(--alert-red);">Logout</button>
  </header>

  <div class="app-container">
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
      <ul>
        <li><a href="#dashboard" class="nav-link" data-section="dashboard">Dashboard</a></li>
        <li><a href="#teacher-selection" class="nav-link" data-section="teacher-selection">Teachers</a></li>
        <li><a href="#settings-section" class="nav-link" data-section="settings-section">Settings</a></li>
      </ul>
    </nav>

    <div class="content-container">
      <!-- Auth Section -->
      <div id="auth-section" class="card">
        <h2>Login / Register</h2>
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="ts-number" placeholder="TS Number">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <select id="role">
          <option value="headteacher">Headteacher</option>
        </select>
        <input type="text" id="school-name" placeholder="School Name">
        <button id="login-btn">Login</button>
        <button id="register-btn">Register</button>
        <p id="auth-msg"></p>
      </div>

      <!-- Dashboard -->
      <div id="dashboard" class="card">
        <h2>Welcome, Headteacher</h2>
        <div id="summary-cards" class="summary-cards"></div>
        <div id="dashboard-charts" class="chart-container"></div> <!-- Added for school-wide charts -->
      </div>

      <!-- Teacher Selection -->
      <div id="teacher-selection" class="card">
        <h2>Select Teacher</h2>
        <input type="text" id="teacher-search" class="search-input" placeholder="Search Teacher by Name or TS No">
        <div id="teachers-list"></div>
      </div>

      <!-- Class Selection -->
      <div id="class-selection" class="card">
        <h2>Select Class</h2>
        <select id="classes-select">
          <option value="">-- Select Class --</option>
        </select>
        <button id="view-class-data">View Data</button>
      </div>

      <!-- Data View -->
      <div id="data-view" class="card">
        <h2>Class Data</h2>
        <div id="alerts-section" class="alerts-section"></div>
        <div class="section-tabs">
          <button class="section-tab active" onclick="loadSectionData('students')">Students</button>
          <button class="section-tab" onclick="loadSectionData('attendance')">Attendance</button>
          <button class="section-tab" onclick="loadSectionData('results')">Results</button>
          <button class="section-tab" onclick="loadSectionData('fees')">Fees</button>
        </div>
        <div id="data-content"></div>
      </div>

      <!-- Settings Section -->
      <div id="settings-section" class="card">
        <h2>School Settings</h2>
        <input type="text" id="school-address" placeholder="School Address">
        <input type="text" id="school-phone" placeholder="School Phone">
        <input type="email" id="school-email" placeholder="School Email">
        <button id="save-settings-btn">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- Loading Modal -->
  <div id="loading-modal">
    <div class="modal-content">
      <p>Loading...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, where, addDoc, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC3Uco6S1xyoxdgjbNtpAe_ofUtG0nI0XI",
      authDomain: "grok-7568a.firebaseapp.com",
      projectId: "grok-7568a",
      storageBucket: "grok-7568a.appspot.com",
      messagingSenderId: "802272835730",
      appId: "1:802272835730:web:f80f3c986cebbfcd51ce4b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let schoolId = null;
    let schoolName = '';
    let currentTeacherId = null;
    let selectedClassId = null;
    let selectedTerm = 'Term 1'; // Default term

    // Show/Hide Loading
    function showLoading() {
      document.getElementById('loading-modal').style.display = 'flex';
    }

    function hideLoading() {
      document.getElementById('loading-modal').style.display = 'none';
    }

    // Show Sections
    function showSection(id, state = {}) {
      ['auth-section', 'dashboard', 'teacher-selection', 'class-selection', 'data-view', 'settings-section'].forEach(s => {
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
      });
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.dataset.section === id);
      });
      history.pushState({ page: id, ...state }, '', `#${id}`);
      if (id === 'dashboard') loadDashboardCharts();
      if (id === 'settings-section') loadSchoolSettings();
    }

    // Handle Back/Forward
    window.onpopstate = function(event) {
      if (event.state) {
        const { page, teacherId, classId } = event.state;
        if (page === 'teacher-selection') {
          showSection('teacher-selection');
        } else if (page === 'class-selection') {
          currentTeacherId = teacherId;
          loadClasses();
          showSection('class-selection');
        } else if (page === 'data-view') {
          currentTeacherId = teacherId;
          selectedClassId = classId;
          showSection('data-view');
          loadSectionData('students');
        } else if (page === 'settings-section') {
          showSection('settings-section');
        } else if (page === 'dashboard') {
          showSection('dashboard');
        } else {
          showSection('auth-section');
        }
      } else {
        showSection('auth-section');
      }
    };

    // Sidebar Navigation Links
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const section = e.target.dataset.section;
        if (section === 'teacher-selection') {
          loadTeachers();
        }
        showSection(section);
      });
    });

    // Register
    document.getElementById('register-btn').addEventListener('click', async () => {
      showLoading();
      const name = document.getElementById('name').value.trim();
      const tsNumber = document.getElementById('ts-number').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const schoolNameInput = document.getElementById('school-name').value.trim();
      const role = document.getElementById('role').value;

      if (!name || !tsNumber || !email || !password || !schoolNameInput) {
        alert('Fill all fields');
        hideLoading();
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        currentUser = userCredential.user;

        const schoolsQuery = query(collection(db, 'schools'), where('name', '==', schoolNameInput));
        const schoolsSnap = await getDocs(schoolsQuery);
        if (schoolsSnap.empty) {
          const schoolRef = await addDoc(collection(db, 'schools'), { name: schoolNameInput });
          schoolId = schoolRef.id;
        } else {
          schoolId = schoolsSnap.docs[0].id;
        }

        await setDoc(doc(db, 'users', currentUser.uid), { schoolId, role });

        await setDoc(doc(db, 'schools', schoolId, 'headteachers', currentUser.uid), {
          name,
          tsNumber,
          email,
          createdAt: new Date().toISOString()
        });

        // Initialize school settings
        await setDoc(doc(db, 'schools', schoolId), { name: schoolNameInput, address: '', phone: '', email: '' }, { merge: true });

        schoolName = schoolNameInput;
        showDashboard();
      } catch (error) {
        alert(`Error: ${error.message}`);
      } finally {
        hideLoading();
      }
    });

    // Login
    document.getElementById('login-btn').addEventListener('click', async () => {
      showLoading();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert('Fill all fields');
        hideLoading();
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        currentUser = userCredential.user;

        const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
        if (userDoc.exists()) {
          const userData = userDoc.data();
          schoolId = userData.schoolId;
          if (userData.role === 'headteacher') {
            const headDoc = await getDoc(doc(db, 'schools', schoolId, 'headteachers', currentUser.uid));
            if (headDoc.exists()) {
              const schoolDoc = await getDoc(doc(db, 'schools', schoolId));
              schoolName = schoolDoc.data().name;
              showDashboard();
            } else {
              alert('Access denied: Not registered as headteacher in this school');
              signOut(auth);
            }
          } else {
            alert('Access denied: Not a headteacher');
            signOut(auth);
          }
        } else {
          alert('User not found');
        }
      } catch (error) {
        alert(`Error: ${error.message}`);
      } finally {
        hideLoading();
      }
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await signOut(auth);
      currentUser = null;
      schoolId = null;
      schoolName = '';
      document.getElementById('logout-btn').style.display = 'none';
      document.getElementById('school-name-display').textContent = '';
      document.querySelector('.sidebar').style.display = 'none';
      showSection('auth-section');
    });

    // Show Dashboard
    async function showDashboard() {
      document.getElementById('logout-btn').style.display = 'block';
      document.getElementById('school-name-display').textContent = schoolName;
      document.querySelector('.sidebar').style.display = 'block';
      showSection('dashboard');
      await loadSummaryCards();
    }

    // Load Summary Cards (Enhanced with more metrics)
    async function loadSummaryCards() {
      showLoading();
      const summaryDiv = document.getElementById('summary-cards');
      summaryDiv.innerHTML = '';
      try {
        const teachersSnap = await getDocs(collection(db, 'schools', schoolId, 'teachers'));
        const teachersCount = teachersSnap.size;

        let studentsCount = 0;
        let classesCount = 0;
        let totalAttendanceEntries = 0;
        let presentCount = 0;
        let totalFeesCollected = 0;
        let totalFeesExpected = 0;
        let totalScores = 0;
        let scoresCount = 0;
        let lowAttendanceClasses = 0;

        for (const teacherDoc of teachersSnap.docs) {
          const classesSnap = await getDocs(collection(db, 'schools', schoolId, 'teachers', teacherDoc.id, 'classes'));
          classesCount += classesSnap.size;

          const studentsSnap = await getDocs(collection(db, 'schools', schoolId, 'teachers', teacherDoc.id, 'students'));
          studentsCount += studentsSnap.size;

          for (const classDoc of classesSnap.docs) {
            const configRef = doc(db, 'schools', schoolId, 'teachers', teacherDoc.id, 'feesConfig', classDoc.id);
            const configSnap = await getDoc(configRef);
            const classTotalFee = configSnap.exists() ? configSnap.data().totalFee || 0 : 0;
            const classStudentsSnap = await getDocs(query(collection(db, 'schools', schoolId, 'teachers', teacherDoc.id, 'students'), where('classId', '==', classDoc.id)));
            const classStudentsCount = classStudentsSnap.size;
            totalFeesExpected += classTotalFee * classStudentsCount;

            const feesQ = query(collection(db, 'schools', schoolId, 'teachers', teacherDoc.id, 'feesHistory'), where('classId', '==', classDoc.id));
            const feesSnap = await getDocs(feesQ);
            feesSnap.forEach(feeDoc => {
              totalFeesCollected += feeDoc.data().amount || 0;
            });

            // Class attendance check for low attendance
            const attQ = query(collection(db, 'schools', schoolId, 'teachers', teacherDoc.id, 'attendanceHistory'), where('classId', '==', classDoc.id));
            const attSnap = await getDocs(attQ);
            let classPresent = 0;
            let classTotal = attSnap.size;
            attSnap.forEach(att => { if (att.data().present) classPresent++; });
            if (classTotal > 0 && (classPresent / classTotal * 100) < 60) lowAttendanceClasses++;
          }

          const attendanceSnap = await getDocs(collection(db, 'schools', schoolId, 'teachers', teacherDoc.id, 'attendanceHistory'));
          attendanceSnap.forEach(attDoc => {
            totalAttendanceEntries++;
            if (attDoc.data().present) presentCount++;
          });

          const resultsSnap = await getDocs(collection(db, 'schools', schoolId, 'teachers', teacherDoc.id, 'results'));
          resultsSnap.forEach(resDoc => {
            const scores = resDoc.data().scores || {};
            Object.values(scores).forEach(score => {
              totalScores += score;
              scoresCount++;
            });
          });
        }

        const attendancePct = totalAttendanceEntries > 0 ? ((presentCount / totalAttendanceEntries) * 100).toFixed(0) : 0;
        const feesPct = totalFeesExpected > 0 ? ((totalFeesCollected / totalFeesExpected) * 100).toFixed(0) : 0;
        const avgScore = scoresCount > 0 ? (totalScores / scoresCount).toFixed(0) : 0;
        const avgGrade = getZambianGrade(avgScore);

        summaryDiv.innerHTML = `
          <div class="summary-card"><h3>👩‍🏫 Teachers</h3><p>${teachersCount}</p></div>
          <div class="summary-card"><h3>👨‍🎓 Students</h3><p>${studentsCount}</p></div>
          <div class="summary-card"><h3>📚 Classes</h3><p>${classesCount}</p></div>
          <div class="summary-card"><h3>📊 Attendance</h3><p>${attendancePct}%</p></div>
          <div class="summary-card"><h3>💰 Fees Collected</h3><p>${feesPct}%</p></div>
          <div class="summary-card"><h3>🎓 Academic Average</h3><p>${avgGrade}</p></div>
          <div class="summary-card"><h3>⚠️ Low Att. Classes</h3><p>${lowAttendanceClasses}</p></div>
        `;
      } catch (error) {
        console.error('Error loading summary:', error);
      } finally {
        hideLoading();
      }
    }

    // New: Load Dashboard Charts (School-wide trends)
    async function loadDashboardCharts() {
      const chartDiv = document.getElementById('dashboard-charts');
      chartDiv.innerHTML = '<canvas id="schoolTrendChart"></canvas>';
      // Example: Aggregate attendance trend school-wide
      // Similar logic as in attendance section, but aggregated
      // For brevity, placeholder chart
      new Chart(document.getElementById('schoolTrendChart'), {
        type: 'line',
        data: {
          labels: ['Jan', 'Feb', 'Mar'], // Placeholder
          datasets: [{
            label: 'School Attendance %',
            data: [85, 90, 88], // Placeholder
            borderColor: getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(),
            fill: false
          }]
        },
        options: { responsive: true }
      });
    }

    // Load Teachers (Enhanced with search)
    async function loadTeachers() {
      showLoading();
      try {
        const teachersRef = collection(db, 'schools', schoolId, 'teachers');
        const teachersSnap = await getDocs(teachersRef);
        const list = document.getElementById('teachers-list');
        list.innerHTML = '';
        if (teachersSnap.empty) {
          list.innerHTML = '<p class="empty-state">No teachers registered under this school yet.</p>';
        } else {
          teachersSnap.forEach(doc => {
            const d = doc.data();
            const item = document.createElement('div');
            item.classList.add('teacher-item');
            item.dataset.name = d.name.toLowerCase();
            item.dataset.ts = d.tsNumber.toLowerCase();
            item.innerHTML = `
              <span>🧑‍🏫</span>
              <div>
                <p>Teacher: ${d.name}</p>
                <p>TS No: ${d.tsNumber}</p>
                <button class="view-teacher-data" data-teacher-id="${doc.id}">View Teacher Data</button>
              </div>
            `;
            list.appendChild(item);
          });
          document.querySelectorAll('.view-teacher-data').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              currentTeacherId = e.target.dataset.teacherId;
              await loadClasses();
              showSection('class-selection', { teacherId: currentTeacherId });
            });
          });
        }

        // Teacher search
        document.getElementById('teacher-search').addEventListener('input', (e) => {
          const query = e.target.value.toLowerCase();
          document.querySelectorAll('.teacher-item').forEach(item => {
            const matches = item.dataset.name.includes(query) || item.dataset.ts.includes(query);
            item.style.display = matches ? 'flex' : 'none';
          });
        });
      } catch (error) {
        alert(`Error loading teachers: ${error.message}`);
      } finally {
        hideLoading();
      }
    }

    // Load Classes
    async function loadClasses() {
      showLoading();
      try {
        const classesRef = collection(db, 'schools', schoolId, 'teachers', currentTeacherId, 'classes');
        const classesSnap = await getDocs(classesRef);
        const select = document.getElementById('classes-select');
        select.innerHTML = '<option value="">-- Select Class --</option>';
        classesSnap.forEach(doc => {
          const option = document.createElement('option');
          option.value = doc.id;
          option.textContent = doc.data().displayName || doc.id;
          select.appendChild(option);
        });
      } catch (error) {
        alert(`Error loading classes: ${error.message}`);
      } finally {
        hideLoading();
      }
    }

    // View Class Data
    document.getElementById('view-class-data').addEventListener('click', () => {
      selectedClassId = document.getElementById('classes-select').value;
      if (!selectedClassId) return alert('Select a class');
      showSection('data-view', { teacherId: currentTeacherId, classId: selectedClassId });
      loadSectionData('students');
    });

    // Zambian Grade
    function getZambianGrade(score) {
      if (score >= 80) return '1 (Distinction)';
      if (score >= 70) return '2 (Distinction)';
      if (score >= 60) return '3 (Merit)';
      if (score >= 50) return '4 (Merit)';
      if (score >= 40) return '5 (Credit)';
      if (score >= 30) return '6 (Credit)';
      if (score >= 20) return '7 (Pass)';
      if (score >= 10) return '8 (Pass)';
      return '9 (Fail)';
    }

    // Load Section Data (Enhanced with export)
    window.loadSectionData = async function(section) {
      document.querySelectorAll('.section-tab').forEach(tab => {
        tab.classList.remove('active');
        if (tab.onclick.toString().includes(`'${section}'`)) {
          tab.classList.add('active');
        }
      });

      showLoading();
      const content = document.getElementById('data-content');
      content.innerHTML = '';
      const alertsDiv = document.getElementById('alerts-section');
      alertsDiv.innerHTML = '';

      try {
        if (section === 'students') {
          const q = query(collection(db, 'schools', schoolId, 'teachers', currentTeacherId, 'students'), where('classId', '==', selectedClassId));
          const data = await getDocs(q);
          if (data.empty) {
            content.innerHTML = '<p class="empty-state">No students in this class yet.</p>';
          } else {
            const p = document.createElement('p');
            p.textContent = `Total Students: ${data.size}`;
            content.appendChild(p);

            const searchInput = document.createElement('input');
            searchInput.classList.add('search-input');
            searchInput.type = 'text';
            searchInput.placeholder = 'Search Student by Name';
            content.appendChild(searchInput);

            const studentsList = document.createElement('div');
            studentsList.id = 'students-list';

            data.forEach(doc => {
              const d = doc.data();
              const studentItem = document.createElement('div');
              studentItem.classList.add('student-item');
              studentItem.dataset.name = d.name.toLowerCase();
              studentItem.innerHTML = `
                <span>🧑‍🎓</span>
                <div>
                  <p class="student-name" data-student-id="${doc.id}">${d.name}</p>
                </div>
              `;
              studentsList.appendChild(studentItem);
            });
            content.appendChild(studentsList);

            document.querySelectorAll('.student-name').forEach(name => {
              name.addEventListener('click', async (e) => {
                const studentId = e.target.dataset.studentId;
                await loadStudentDetails(studentId);
              });
            });

            searchInput.addEventListener('input', (e) => {
              const query = e.target.value.toLowerCase();
              document.querySelectorAll('.student-item').forEach(item => {
                item.style.display = item.dataset.name.includes(query) ? 'flex' : 'none';
              });
            });

            // Export button
            const exportBtn = document.createElement('button');
            exportBtn.classList.add('export-btn');
            exportBtn.textContent = 'Export Students to CSV';
            exportBtn.addEventListener('click', () => exportToCSV(data.docs.map(doc => doc.data()), 'students'));
            content.appendChild(exportBtn);
          }
        } else if (section === 'attendance') {
          const termSelect = document.createElement('select');
          termSelect.innerHTML = `
            <option value="Term 1">Term 1</option>
            <option value="Term 2">Term 2</option>
            <option value="Term 3">Term 3</option>
          `;
          termSelect.value = selectedTerm;
          termSelect.addEventListener('change', (e) => {
            selectedTerm = e.target.value;
            loadSectionData('attendance');
          });
          content.appendChild(termSelect);

          const q = query(collection(db, 'schools', schoolId, 'teachers', currentTeacherId, 'attendanceHistory'), 
                          where('classId', '==', selectedClassId),
                          where('term', '==', selectedTerm),
                          orderBy('date', 'desc'));
          const data = await getDocs(q);
          if (data.empty) {
            content.innerHTML += '<p class="empty-state">No attendance recorded yet for this term.</p>';
          } else {
            let totalEntries = 0;
            let presentCount = 0;
            let mostRecentDate = '';
            const attendanceByDate = new Map();

            const table = createTable(['Date', 'Student ID', 'Present', 'Term', 'Week', 'Synced At']);
            data.forEach(doc => {
              const d = doc.data();
              addRow(table, [d.date, d.studentId, d.present ? 'Yes' : 'No', d.term, d.week, d.syncedAt || 'N/A']);
              totalEntries++;
              if (d.present) presentCount++;
              if (!mostRecentDate || d.date > mostRecentDate) mostRecentDate = d.date;

              const dateKey = d.date.substring(0, 7);
              const entry = attendanceByDate.get(dateKey) || { total: 0, present: 0 };
              entry.total++;
              if (d.present) entry.present++;
              attendanceByDate.set(dateKey, entry);
            });
            content.appendChild(table);

            const attendancePct = ((presentCount / totalEntries) * 100).toFixed(2);
            const summary = document.createElement('div');
            summary.innerHTML = `
              <p>Attendance Percentage: ${attendancePct}%</p>
              <p>Most Recent Marking Date: ${mostRecentDate}</p>
            `;
            content.appendChild(summary);

            if (attendancePct < 60) {
              const alert = document.createElement('div');
              alert.classList.add('alert');
              alert.textContent = '⚠️ ATTENDANCE RISK: Attendance is below Ministry recommended standard.';
              alertsDiv.appendChild(alert);
            }

            const chartContainer = document.createElement('div');
            chartContainer.classList.add('chart-container');
            const canvas = document.createElement('canvas');
            canvas.id = 'attendanceChart';
            chartContainer.appendChild(canvas);
            content.appendChild(chartContainer);

            const labels = Array.from(attendanceByDate.keys()).sort();
            const dataPoints = labels.map(label => {
              const entry = attendanceByDate.get(label);
              return (entry.present / entry.total * 100).toFixed(2);
            });

            new Chart(canvas, {
              type: 'line',
              data: {
                labels: labels,
                datasets: [{
                  label: 'Attendance %',
                  data: dataPoints,
                  borderColor: getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(),
                  fill: false
                }]
              },
              options: {
                responsive: true,
                scales: {
                  y: { min: 0, max: 100 }
                }
              }
            });

            // Export button
            const exportBtn = document.createElement('button');
            exportBtn.classList.add('export-btn');
            exportBtn.textContent = 'Export Attendance to PDF';
            exportBtn.addEventListener('click', () => exportToPDF(table, 'Attendance Report'));
            content.appendChild(exportBtn);
          }
        } else if (section === 'results') {
          const q = query(collection(db, 'schools', schoolId, 'teachers', currentTeacherId, 'results'), where('classId', '==', selectedClassId));
          const data = await getDocs(q);
          if (data.empty) {
            content.innerHTML = '<p class="empty-state">No results recorded yet.</p>';
          } else {
            let overallTotalScore = 0;
            let overallCount = 0;
            const overallGradeDist = new Map();

            data.forEach(doc => {
              const d = doc.data();
              const header = document.createElement('h3');
              header.textContent = `${d.subject} - ${d.testName} (${d.category}, ${d.level}) Date: ${d.date} Synced: ${d.syncedAt || 'N/A'}`;
              content.appendChild(header);
              const table = createTable(['Student ID', 'Score', 'Grade']);
              let totalScore = 0;
              let count = 0;
              const gradeDist = new Map();
              if (d.scores) {
                Object.entries(d.scores).forEach(([studentId, score]) => {
                  const grade = getZambianGrade(score);
                  addRow(table, [studentId, score, grade]);
                  totalScore += score;
                  count++;
                  overallTotalScore += score;
                  overallCount++;
                  gradeDist.set(grade, (gradeDist.get(grade) || 0) + 1);
                  overallGradeDist.set(grade, (overallGradeDist.get(grade) || 0) + 1);
                });
              }
              content.appendChild(table);
              const summary = document.createElement('div');
              summary.innerHTML = `<p>Class Average: ${(totalScore / count || 0).toFixed(2)}</p><h4>Grade Distribution:</h4>`;
              const distTable = createTable(['Grade', 'Count']);
              gradeDist.forEach((cnt, grd) => addRow(distTable, [grd, cnt]));
              summary.appendChild(distTable);
              content.appendChild(summary);
            });

            let failCount = 0;
            overallGradeDist.forEach((cnt, grd) => {
              if (['7 (Pass)', '8 (Pass)', '9 (Fail)'].includes(grd)) failCount += cnt;
            });
            if (failCount > overallCount / 2) {
              const alert = document.createElement('div');
              alert.classList.add('alert');
              alert.textContent = '⚠️ ACADEMIC PERFORMANCE WARNING: High failure rate detected.';
              alertsDiv.appendChild(alert);
            }

            const chartContainer = document.createElement('div');
            chartContainer.classList.add('chart-container');
            const canvas = document.createElement('canvas');
            canvas.id = 'gradeChart';
            chartContainer.appendChild(canvas);
            content.appendChild(chartContainer);

            const labels = Array.from(overallGradeDist.keys()).sort();
            const dataPoints = labels.map(label => overallGradeDist.get(label));

            new Chart(canvas, {
              type: 'bar',
              data: {
                labels: labels,
                datasets: [{
                  label: 'Count',
                  data: dataPoints,
                  backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()
                }]
              },
              options: {
                responsive: true,
                scales: {
                  y: { beginAtZero: true }
                }
              }
            });

            // Export button
            const exportBtn = document.createElement('button');
            exportBtn.classList.add('export-btn');
            exportBtn.textContent = 'Export Results to PDF';
            exportBtn.addEventListener('click', () => exportToPDF(content, 'Results Report'));
            content.appendChild(exportBtn);
          }
        } else if (section === 'fees') {
          const configRef = doc(db, 'schools', schoolId, 'teachers', currentTeacherId, 'feesConfig', selectedClassId);
          const configSnap = await getDoc(configRef);
          const totalFee = configSnap.exists() ? configSnap.data().totalFee || 0 : 0;

          const studentsQ = query(collection(db, 'schools', schoolId, 'teachers', currentTeacherId, 'students'), where('classId', '==', selectedClassId));
          const studentsSnap = await getDocs(studentsQ);
          const studentsMap = new Map();
          let studentCount = 0;
          studentsSnap.forEach(doc => {
            studentsMap.set(doc.id, doc.data());
            studentCount++;
          });
          const expectedTotal = totalFee * studentCount;

          const feesQ = query(collection(db, 'schools', schoolId, 'teachers', currentTeacherId, 'feesHistory'), where('classId', '==', selectedClassId));
          const feesData = await getDocs(feesQ);
          if (feesData.empty) {
            content.innerHTML = '<p class="empty-state">No fees recorded yet.</p>';
          } else {
            const studentPayments = new Map();
            let totalCollected = 0;
            feesData.forEach(doc => {
              const d = doc.data();
              if (!studentPayments.has(d.studentId)) studentPayments.set(d.studentId, []);
              studentPayments.get(d.studentId).push({date: d.date, amount: d.amount, syncedAt: d.syncedAt || 'N/A'});
              totalCollected += d.amount;
            });

            studentsMap.forEach((student, studentId) => {
              const payments = (studentPayments.get(studentId) || []).sort((a, b) => new Date(a.date) - new Date(b.date));
              const header = document.createElement('h3');
              header.textContent = `🧑‍🎓 ${student.name} (ID: ${studentId})`;
              content.appendChild(header);
              const table = createTable(['Date', 'Amount', 'Synced At', 'Running Balance']);
              let running = 0;
              let lastDate = '';
              payments.forEach(p => {
                running += p.amount;
                addRow(table, [p.date, p.amount, p.syncedAt, running]);
                lastDate = p.date;
              });
              content.appendChild(table);
              const outstanding = totalFee - running;
              const p = document.createElement('p');
              p.textContent = `Outstanding: ${outstanding > 0 ? outstanding : 0} | Last Payment: ${lastDate || 'None'}`;
              if (outstanding > 0) p.style.color = 'red';
              content.appendChild(p);
            });

            const outstandingTotal = expectedTotal - totalCollected;
            const percentage = expectedTotal > 0 ? ((totalCollected / expectedTotal) * 100).toFixed(2) : 0;
            const summary = document.createElement('div');
            summary.innerHTML = `
              <h3>Class Fees Summary</h3>
              <p>Total Expected: ${expectedTotal}</p>
              <p>Total Collected: ${totalCollected}</p>
              <p>Total Outstanding: ${outstandingTotal}</p>
              <p>Collection Percentage: ${percentage}%</p>
            `;
            content.appendChild(summary);

            if (percentage < 50) {
              const alert = document.createElement('div');
              alert.classList.add('alert');
              alert.textContent = '⚠️ FEES COLLECTION CRITICAL: Less than half of expected fees collected.';
              alertsDiv.appendChild(alert);
            }

            // Export button
            const exportBtn = document.createElement('button');
            exportBtn.classList.add('export-btn');
            exportBtn.textContent = 'Export Fees to PDF';
            exportBtn.addEventListener('click', () => exportToPDF(summary, 'Fees Report'));
            content.appendChild(exportBtn);
          }
        }
      } catch (error) {
        content.innerHTML = `<p class="empty-state">Error: ${error.message}</p>`;
      } finally {
        hideLoading();
      }
    };

    // Load Student Details (Enhanced: Removed TS No, added Student ID)
    async function loadStudentDetails(studentId) {
      const content = document.getElementById('data-content');
      showLoading();
      try {
        const studentRef = doc(db, 'schools', schoolId, 'teachers', currentTeacherId, 'students', studentId);
        const studentSnap = await getDoc(studentRef);
        if (!studentSnap.exists()) {
          content.innerHTML = '<p class="empty-state">Student not found.</p>';
          return;
        }
        const student = studentSnap.data();

        content.innerHTML = '';

        const detailsTable = document.createElement('table');
        detailsTable.classList.add('student-details-table');

        const thead = document.createElement('thead');
        thead.innerHTML = `
          <tr>
            <th>Field</th>
            <th>Details</th>
          </tr>
        `;
        detailsTable.appendChild(thead);

        const tbody = document.createElement('tbody');
        addRow(tbody, ['Student ID', studentId]);
        addRow(tbody, ['Name', student.name || 'N/A']);
        addRow(tbody, ['Phone', student.phone || 'N/A']);
        addRow(tbody, ['Address', student.address || 'N/A']);
        addRow(tbody, ['Email', student.email || 'N/A']);
        detailsTable.appendChild(tbody);

        content.appendChild(detailsTable);

        const closeBtn = document.createElement('button');
        closeBtn.textContent = 'Close';
        closeBtn.classList.add('exit-btn');
        closeBtn.addEventListener('click', () => {
          loadSectionData('students');
        });
        content.appendChild(closeBtn);
      } catch (error) {
        content.innerHTML = `<p class="empty-state">Error loading student details: ${error.message}</p>`;
      } finally {
        hideLoading();
      }
    }

    // New: Export to CSV
    function exportToCSV(data, filename) {
      const csv = data.map(row => Object.values(row).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${filename}.csv`;
      link.click();
    }

    // New: Export to PDF (placeholder, as jspdf was removed but exports still referenced; adjust if needed)
    function exportToPDF(element, title) {
      // Implement simple print-to-PDF prompt or remove if not needed
      window.print(); // Fallback to browser print
    }

    async function loadSchoolSettings() {
      showLoading();
      try {
        const schoolDoc = await getDoc(doc(db, 'schools', schoolId));

    document.getElementById('save-settings-btn').addEventListener('click', async () => {
      showLoading();

        await updateDoc(doc(db, 'schools', schoolId), {
          address: document.getElementById('school-address').value,
          phone: document.getElementById('school-phone').value,
          email: document.getElementById('school-email').value
        });
        alert('Settings saved successfully');
      } catch (error) {
        alert(`Error saving settings: ${error.message}`);
      } finally {
        hideLoading();
      }
    });

    // Helper functions
    function createTable(headers) {
      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const tr = document.createElement('tr');
      headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
      table.appendChild(thead);
      table.appendChild(document.createElement('tbody'));
      return table;
    }

    function addRow(element, cells) {
      const tr = document.createElement('tr');
      cells.forEach(c => {
        const td = document.createElement('td');
        td.textContent = c;
        tr.appendChild(td);
      });
      if (element.tagName === 'TABLE') {
        element.querySelector('tbody').appendChild(tr);
      } else {
        element.appendChild(tr);
      }
    }

    // Initial
    showSection('auth-section');
  </script>
